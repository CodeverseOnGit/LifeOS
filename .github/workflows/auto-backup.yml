name: Auto Backup JSON

on:
  schedule:
    - cron: '0 0 * * *'   # every midnight UTC

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Fetch JSON from Netlify
        run: |
          curl -s https://<your-site>.netlify.app/.netlify/functions/fetchData -o data.json

      - name: Encrypt JSON
        run: |
          node -e "
          const fs = require('fs');
          const crypto = require('crypto');
          const json = JSON.parse(fs.readFileSync('data.json', 'utf-8'));
          const key = crypto.scryptSync('super-secret-password', 'salt', 32);
          const iv = crypto.randomBytes(16);
          const cipher = crypto.createCipheriv('aes-256-cbc', key, iv);
          const encrypted = Buffer.concat([cipher.update(JSON.stringify(json)), cipher.final()]);
          fs.writeFileSync('data.enc.json', iv.toString('hex') + ':' + encrypted.toString('hex'));
          "
      
      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add data.enc.json
          git commit -m "Auto backup $(date -u +'%Y-%m-%d %H:%M:%S') || true"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}