<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LifeOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="icon" href="images/logo.png">
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a24;
      --surface3: #22222f;
      --border: #2a2a3a;
      --border2: #3a3a50;
      --accent: #7c6aff;
      --accent2: #ff6a9e;
      --accent3: #6affb8;
      --accent4: #ffb86a;
      --text: #e8e8f0;
      --text2: #9090a8;
      --text3: #606078;
      --danger: #ff4466;
      --success: #44ff88;
      --mono: 'Space Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden
    }

    .header img {
      display: block;
      height: 30px;
      /* or whatever fits */
    }

    /* SCROLLBAR */
    ::-webkit-scrollbar {
      width: 4px;
      height: 4px
    }

    ::-webkit-scrollbar-track {
      background: var(--surface)
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 2px
    }

    /* LAYOUT */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 0 24px;
      height: 56px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      position: relative;
      z-index: 100
    }

    .logo {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--accent);
      text-transform: uppercase
    }

    .logo span {
      color: var(--accent2)
    }

    .date-badge {
      margin-left: auto;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text3);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 4px
    }

    /* NAV TABS */
    .nav {
      display: flex;
      gap: 2px;
      padding: 0 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0
    }

    .nav-tab {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 10px 16px;
      border: none;
      background: none;
      color: var(--text3);
      cursor: pointer;
      position: relative;
      transition: color 0.2s;
      white-space: nowrap
    }

    .nav-tab:hover {
      color: var(--text2)
    }

    .nav-tab.active {
      color: var(--accent)
    }

    .nav-tab.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--accent)
    }

    .nav-tab:nth-child(2).active {
      color: var(--accent2)
    }

    .nav-tab:nth-child(2).active::after {
      background: var(--accent2)
    }

    .nav-tab:nth-child(3).active {
      color: var(--accent3)
    }

    .nav-tab:nth-child(3).active::after {
      background: var(--accent3)
    }

    .nav-tab:nth-child(4).active {
      color: var(--accent4)
    }

    .nav-tab:nth-child(4).active::after {
      background: var(--accent4)
    }

    .nav-tab:nth-child(5).active {
      color: var(--accent)
    }

    /* CONTENT */
    .content {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column
    }

    .tab-panel {
      display: none;
      flex: 1;
      overflow: auto;
      padding: 20px 24px
    }

    .tab-panel.active {
      display: flex;
      flex-direction: column;
      gap: 16px;
      flex: 1;
      min-height: 0;
      /* ensures child flex can scroll */
      overflow: hidden;
      /* parent hides overflow, child scrolls */
    }

    /* BUTTONS */
    .btn {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 6px 14px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--text2);
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.15s
    }

    .btn:hover {
      border-color: var(--accent);
      color: var(--accent)
    }

    .btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff
    }

    .btn.primary:hover {
      background: #6a58e8;
      border-color: #6a58e8;
      color: #fff
    }

    .btn.danger {
      border-color: var(--danger);
      color: var(--danger)
    }

    .btn.danger:hover {
      background: var(--danger);
      color: #fff
    }

    .btn.small {
      padding: 3px 8px;
      font-size: 10px
    }

    .btn.success {
      border-color: var(--success);
      color: var(--success)
    }

    .btn.pink {
      border-color: var(--accent2);
      color: var(--accent2)
    }

    .btn.pink:hover {
      background: var(--accent2);
      color: #fff
    }

    /* INPUTS */
    input,
    textarea,
    select {
      font-family: var(--mono);
      font-size: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 4px;
      padding: 6px 10px;
      outline: none;
      transition: border-color 0.15s
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--accent)
    }

    select option {
      background: var(--surface2)
    }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px)
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 24px;
      min-width: 360px;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto
    }

    .modal h3 {
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
      font-family: var(--mono)
    }

    .modal-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      flex-direction: column
    }

    .modal-row label {
      font-size: 11px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-family: var(--mono)
    }

    .modal-row input,
    .modal-row select,
    .modal-row textarea {
      width: 100%
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 16px
    }

    /* SECTION HEADER */
    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px
    }

    .section-title {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text3)
    }

    .pill {
      font-family: var(--mono);
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 12px;
      border: 1px solid
    }

    /* ==================== TAB 1: CALENDAR ==================== */
    .cal-header {
      display: flex;
      align-items: center;
      gap: 12px
    }

    .cal-header h2 {
      font-size: 20px;
      font-weight: 800;
      font-family: var(--sans)
    }

    .cal-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto
    }

    .cal-body {
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      flex: 1;
      min-height: 0
    }

    .cal-time-col {
      background: var(--surface);
      border-right: 1px solid var(--border)
    }

    .cal-time-slot {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 10px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text3);
      border-bottom: 1px solid var(--border)
    }

    .cal-events-col {
      position: relative;
      overflow-y: auto;
      background: var(--surface)
    }

    .cal-event-row {
      height: 48px;
      border-bottom: 1px solid var(--border);
      position: relative;
      cursor: pointer;
      transition: background 0.1s
    }

    .cal-event-row:hover {
      background: var(--surface2)
    }

    .cal-event {
      position: absolute;
      left: 4px;
      right: 4px;
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 11px;
      font-family: var(--mono);
      cursor: pointer;
      z-index: 10;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .cal-event .del-btn {
      opacity: 0;
      font-size: 9px;
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.6);
      cursor: pointer;
      padding: 0 2px
    }

    .cal-event:hover .del-btn {
      opacity: 1
    }

    .cal-now-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--accent2);
      z-index: 20;
      pointer-events: none
    }

    .cal-now-line::before {
      content: '';
      position: absolute;
      left: -4px;
      top: -4px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent2)
    }

    .cal-week-grid {
      display: grid;
      grid-template-columns: 80px repeat(7, 1fr);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      flex: 1;
      min-height: 0;
      gap: 0
    }

    .cal-week-day-header {
      background: var(--surface2);
      padding: 8px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      font-size: 11px;
      font-family: var(--mono);
      color: var(--text3)
    }

    .cal-week-day-header.today {
      color: var(--accent)
    }

    .cal-mode-toggle {
      display: flex;
      gap: 4px
    }

    .cal-mode-btn {
      font-family: var(--mono);
      font-size: 10px;
      padding: 4px 10px;
      border: 1px solid var(--border);
      background: none;
      color: var(--text3);
      cursor: pointer;
      border-radius: 3px
    }

    .cal-mode-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff
    }

    /* ==================== TAB 2: TODO ==================== */
    .months-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px
    }

    .month-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
      overflow: hidden
    }

    .month-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--accent2)
    }

    .month-card:hover {
      border-color: var(--accent2);
      transform: translateY(-2px)
    }

    .month-card h3 {
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 4px
    }

    .month-card span {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text3)
    }

    .todo-sheet {
      overflow-x: auto;
      flex: 1
    }

    .todo-table {
      border-collapse: collapse;
      width: 100%;
      font-family: var(--mono);
      font-size: 11px;
      min-width: 900px
    }

    .todo-table th {
      background: var(--surface2);
      color: var(--text3);
      padding: 8px 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      border: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 5;
      font-size: 10px
    }

    .todo-table td {
      border: 1px solid var(--border);
      padding: 4px 6px;
      vertical-align: top;
      background: var(--surface)
    }

    .todo-table tr:hover td {
      background: var(--surface2)
    }

    .todo-cell-input {
      width: 100%;
      background: none;
      border: none;
      color: var(--text);
      font-family: var(--mono);
      font-size: 11px;
      resize: none;
      min-height: 24px;
      outline: none;
      line-height: 1.4
    }

    .todo-day-label {
      color: var(--text3);
      font-size: 10px;
      margin-bottom: 2px
    }

    .goal-row td {
      background: rgba(124, 106, 255, 0.08) !important
    }

    .goal-row td:first-child {
      color: var(--accent);
      font-weight: 700
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      color: var(--text3);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: none;
      border: none;
      padding: 0 0 4px 0;
      transition: color 0.15s
    }

    .back-btn:hover {
      color: var(--text)
    }

    /* ==================== TAB 3: SOCIAL ==================== */
    .social-table-wrap {
      overflow-x: auto;
      flex: 1
    }

    .social-table {
      border-collapse: collapse;
      width: 100%;
      min-width: 1100px;
      font-family: var(--mono);
      font-size: 11px
    }

    .social-table th {
      background: var(--surface2);
      color: var(--text3);
      padding: 8px 10px;
      border: 1px solid var(--border);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 10px;
      position: sticky;
      top: 0;
      z-index: 5
    }

    .social-table td {
      border: 1px solid var(--border);
      padding: 6px 8px;
      background: var(--surface);
      vertical-align: middle
    }

    .social-table tr:hover td {
      background: var(--surface2)
    }

    .social-input {
      width: 100%;
      background: none;
      border: none;
      color: var(--text);
      font-family: var(--mono);
      font-size: 11px;
      outline: none
    }

    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 3px
    }

    .radio-item {
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      font-size: 10px;
      color: var(--text2)
    }

    .radio-item input {
      width: 12px;
      height: 12px;
      accent-color: var(--accent);
      cursor: pointer;
      flex-shrink: 0
    }

    .check-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px
    }

    .check-item {
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      font-size: 10px;
      color: var(--text2);
      white-space: nowrap
    }

    .check-item input {
      width: 12px;
      height: 12px;
      accent-color: var(--accent3);
      cursor: pointer;
      flex-shrink: 0
    }

    .row-actions {
      display: flex;
      gap: 4px;
      align-items: center
    }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text3);
      padding: 2px 4px;
      font-size: 12px;
      transition: color 0.15s;
      border-radius: 3px
    }

    .icon-btn:hover {
      color: var(--text);
      background: var(--surface3)
    }

    .social-date {
      font-size: 10px;
      color: var(--text3);
      white-space: nowrap
    }

    /* ==================== TAB 4: FITNESS ==================== */
    .fitness-top {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 16px;
      align-items: start
    }

    .fitness-date-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 12px
    }

    .weight-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 14px;
      font-family: var(--mono)
    }

    .weight-badge label {
      font-size: 10px;
      color: var(--text3);
      display: block;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 1px
    }

    .weight-input-field {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent4);
      width: 80px;
      background: none;
      border: none;
      outline: none;
      font-family: var(--mono)
    }

    .day-type-selector {
      display: flex;
      gap: 6px;
      flex-wrap: wrap
    }

    .day-type-btn {
      font-family: var(--mono);
      font-size: 10px;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: none;
      color: var(--text3);
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 1px;
      text-transform: uppercase
    }

    .day-type-btn.active.day {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(124, 106, 255, 0.12)
    }

    .day-type-btn.active.night {
      border-color: var(--accent2);
      color: var(--accent2);
      background: rgba(255, 106, 158, 0.12)
    }

    .day-type-btn.active.gym {
      border-color: var(--accent3);
      color: var(--accent3);
      background: rgba(106, 255, 184, 0.12)
    }

    .day-type-btn.active.lazy {
      border-color: var(--text3);
      color: var(--text2);
      background: var(--surface3)
    }

    .exercise-sections {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      flex: 1
    }

    .exercise-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px
    }

    .exercise-section-title {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 4px
    }

    .exercise-section-title[style*="Day"],
    .exercise-section-title[style*="Night"],
    .exercise-section-title[style*="Gym"] {
      display: none;
    }

    .exercise-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      background: var(--surface2);
      border-radius: 4px;
      border: 1px solid var(--border)
    }

    .exercise-item input[type=checkbox] {
      width: 14px;
      height: 14px;
      accent-color: var(--accent3);
      cursor: pointer;
      flex-shrink: 0
    }

    .exercise-name {
      flex: 1;
      background: none;
      border: none;
      color: var(--text);
      font-family: var(--mono);
      font-size: 11px;
      outline: none
    }

    .exercise-name.done {
      text-decoration: line-through;
      color: var(--text3)
    }

    .exercise-sets {
      width: 80px;
      font-size: 10px;
      color: var(--text3)
    }

    .template-actions {
      display: flex;
      gap: 6px;
      margin-top: 4px
    }

    /* ==================== TAB 5: APPS ==================== */
    .apps-controls {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap
    }

    .search-input {
      width: 200px
    }

    .status-filter {
      display: flex;
      gap: 4px;
      flex-wrap: wrap
    }

    .filter-pill {
      font-family: var(--mono);
      font-size: 10px;
      padding: 3px 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: none;
      color: var(--text3);
      cursor: pointer;
      transition: all 0.15s
    }

    .filter-pill.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(124, 106, 255, 0.12)
    }

    .apps-table-wrap {
      overflow-x: auto;
      flex: 1
    }

    .apps-table {
      border-collapse: collapse;
      width: 100%;
      min-width: 900px;
      font-family: var(--mono);
      font-size: 11px
    }

    .apps-table th {
      background: var(--surface2);
      color: var(--text3);
      padding: 8px 12px;
      border: 1px solid var(--border);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 10px;
      position: sticky;
      top: 0;
      z-index: 5
    }

    .apps-table td {
      border: 1px solid var(--border);
      padding: 8px 10px;
      background: var(--surface);
      vertical-align: middle
    }

    .apps-table tr:hover td {
      background: var(--surface2)
    }

    .apps-input {
      width: 100%;
      background: none;
      border: none;
      color: var(--text);
      font-family: var(--mono);
      font-size: 11px;
      outline: none
    }

    .status-badge {
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      border: 1px solid;
      white-space: nowrap
    }

    .status-idea {
      border-color: var(--text3);
      color: var(--text3)
    }

    .status-planning {
      border-color: var(--accent4);
      color: var(--accent4)
    }

    .status-building {
      border-color: var(--accent);
      color: var(--accent)
    }

    .status-launched {
      border-color: var(--accent3);
      color: var(--accent3)
    }

    .status-paused {
      border-color: var(--accent2);
      color: var(--accent2)
    }

    .status-cancelled {
      border-color: var(--danger);
      color: var(--danger)
    }

    .type-badge {
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 10px;
      border: 1px solid var(--border2);
      color: var(--text2);
      white-space: nowrap
    }

    .deadline-input {
      width: 120px
    }

    /* EMPTY STATE */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text3);
      font-family: var(--mono);
      font-size: 12px
    }

    .empty-icon {
      font-size: 40px;
      margin-bottom: 12px;
      opacity: 0.3
    }

    .todo-table th,
    .todo-table td {
      border: 1px solid var(--border);
    }

    @media(max-width:768px) {
      .exercise-sections {
        grid-template-columns: 1fr
      }

      .months-grid {
        grid-template-columns: repeat(3, 1fr)
      }
    }
  </style>
</head>

<body>
  <div class="app" id="app">

    <div class="header">
      <div class="logo">Life<span>OS</span></div>
<button id="saveCloudBtn">Save</button>
      <span id="saveStatus"></span>
<button id="loadJsonBtn">Load JSON</button>
<input type="file" id="jsonFileInput" accept=".json" style="display:none">

      <div class="date-badge" id="headerDate"></div>
    </div>

    <div class="nav">
      <button class="nav-tab" onclick="switchTab(2)">📱 Social Tracker</button>
      <button class="nav-tab" onclick="switchTab(3)">💪 Fitness</button>
    </div>

    <div class="content">



      <!-- ========== TAB 2: MONTHLY TODO ========== -->
      <div class="tab-panel" id="tab1">
        <div id="todoView">
          <div class="section-header">
            <div class="section-title">Monthly Planner</div>
            <span class="pill" style="border-color:var(--accent2);color:var(--accent2)" id="yearLabel"></span>
          </div>
          <div class="months-grid" id="monthsGrid"></div>
        </div>
        <div id="sheetView" style="display:none;flex:1;flex-direction:column;gap:12px">
          <div style="display:flex;align-items:center;gap:12px">
            <div id="monthDaysGrid"></div>
            <button class="back-btn" onclick="closeSheet()">← Back</button>
            <span class="section-title" id="sheetTitle"></span>
          </div>
          <div id="todoTableContainer" style="max-height: 500px; overflow-y: auto;">
            <table id="todoTable" style="border-collapse: collapse; width: 100%;"></table>
          </div>
        </div>
      </div>

      <!-- ========== TAB 3: SOCIAL TRACKER ========== -->
      <div class="tab-panel" id="tab2">
        <div class="section-header">
          <div class="section-title">Social Media Tracker</div>
          <button class="btn primary small" onclick="addSocialRow('top')">+ Row Top</button>
          <button class="btn small" onclick="addSocialRow('bottom')">+ Row Bottom</button>
        </div>
        <div class="social-table-wrap">
          <table class="social-table">
            <thead>
              <tr>
                <th style="width:32px"></th>
                <th>Date</th>
                <th style="min-width:160px">Content Title</th>
                <th style="min-width:120px">TikTok</th>
                <th style="min-width:120px">YouTube</th>
                <th style="min-width:120px">Instagram</th>
                <th style="min-width:120px">X / Twitter</th>
                <th style="min-width:140px">50 Interactions</th>
                <th style="width:60px">Actions</th>
              </tr>
            </thead>
            <tbody id="socialBody"></tbody>
          </table>
        </div>
      </div>

      <!-- ========== TAB 4: FITNESS ========== -->
      <div class="tab-panel" id="tab3">
        <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
          <div class="fitness-date-nav">
            <button class="btn small" onclick="fitnessNav(-1)">‹</button>
            <span id="fitnessDateLabel" style="min-width:120px;text-align:center"></span>
            <button class="btn small" onclick="fitnessNav(1)">›</button>
            <button class="btn small" onclick="fitnessNavToday()">Today</button>
          </div>
          <div class="weight-badge">
            <label>Weight (kg)</label>
            <input class="weight-input-field" type="number" step="0.1" id="weightInput" placeholder="0.0"
              oninput="saveFitnessData()">
            <span id="weightDelta" style="font-size:10px;margin-left:8px;color:var(--text3)"></span>
          </div>
          <div class="day-type-selector" id="dayTypeSelector"></div>
          <button class="btn small pink" onclick="duplicateFromDate(prompt('Enter date (YYYY-MM-DD)'))">Duplicate From
            Date</button>
          <button class="btn primary small" onclick="openAddExercise()">+ Exercise</button>
        </div>
        <div class="exercise-sections" id="exerciseSections">
          <div class="exercise-section">
            <div class="exercise-section-title" style="color:var(--accent)">🌅 Day Workout</div>
            <div id="exList_day"></div>
            <button class="btn small" onclick="openAddExercise('day')">+ Add</button>
          </div>
          <div class="exercise-section">
            <div class="exercise-section-title" style="color:var(--accent2)">🌙 Night</div>
            <div id="exList_night"></div>
            <button class="btn small" onclick="openAddExercise('night')">+ Add</button>
          </div>
          <div class="exercise-section">
            <div class="exercise-section-title" style="color:var(--accent3)">🏋️ Gym</div>
            <div id="exList_gym"></div>
            <button class="btn small" onclick="openAddExercise('gym')">+ Add</button>
          </div>
        </div>
      </div>

      <!-- ========== TAB 5: APP DEV ========== -->
      <div class="tab-panel" id="tab4">
        <div class="apps-controls">
          <input class="search-input" type="text" placeholder="Search apps..." oninput="filterApps(this.value)"
            id="appSearch">
          <div class="status-filter" id="statusFilter"></div>
          <button class="btn primary small" onclick="openAddApp()" style="margin-left:auto">+ New App</button>
        </div>
        <div class="apps-table-wrap">
          <table class="apps-table">
            <thead>
              <tr>
                <th>#</th>
                <th style="min-width:140px">App Name / Idea</th>
                <th style="min-width:200px">Short Description</th>
                <th style="min-width:100px">Status</th>
                <th style="min-width:100px">Type</th>
                <th style="min-width:200px">Additional Info</th>
                <th style="min-width:110px">Deadline</th>
                <th style="width:60px">Actions</th>
              </tr>
            </thead>
            <tbody id="appsBody"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <!-- MODAL CONTAINER -->
  <div id="modalOverlay" class="modal-overlay" style="display:none" onclick="closeModalOnOverlay(event)">
    <div class="modal" id="modalBox"></div>
  </div>

  <script>
    // ============================================================
    // STATE MANAGEMENT
    // ============================================================
    const STORE_KEY = 'nexus_data_v2';

    let state = {
      events: [],        // calendar events
      todoData: {},      // { "2025-01": { rows: [...] } }
      socialRows: [],    // social tracker rows
      fitness: {},       // { "2025-01-15": { weight, dayType, exercises: {day:[],night:[],gym:[]} } }
      apps: [],          // app dev items
    };

    function load() {
      try { const s = localStorage.getItem(STORE_KEY); if (s) state = JSON.parse(s); } catch (e) { }
      if (!state.events) state.events = [];
      if (!state.todoData) state.todoData = {};
      if (!state.socialRows) state.socialRows = [];
      if (!state.fitness) state.fitness = {};
      if (!state.apps) state.apps = [];
    }

    function save() {
      try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch (e) { }
    }

    // ============================================================
    // UTILS
    // ============================================================
    const MONTHS = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
    const DAYS = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

    function today() { return new Date(); }
    function fmtDate(d) { return d.toISOString().slice(0, 10); }
    function fmtMonthKey(y, m) { return `${y}-${String(m + 1).padStart(2, '0')}`; }
    function parseMonthKey(k) { const [y, m] = k.split('-'); return { y: parseInt(y), m: parseInt(m) - 1 }; }
    function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

    function openModal(html) {
      document.getElementById('modalBox').innerHTML = html;
      document.getElementById('modalOverlay').style.display = 'flex';
    }
    function closeModal() {
      document.getElementById('modalOverlay').style.display = 'none';
    }
    function closeModalOnOverlay(e) {
      if (e.target === document.getElementById('modalOverlay')) closeModal();
    }

    // ============================================================
    // TABS
    // ============================================================
    let currentTab = 0;
    function switchTab(i) {
      document.querySelectorAll('.tab-panel').forEach((p, j) => p.classList.toggle('active', j === i));
      document.querySelectorAll('.nav-tab').forEach((b, j) => b.classList.toggle('active', j === i));
      currentTab = i;
      if (i === 0) renderCal();
      if (i === 1) renderTodoMonths();
      if (i === 2) renderSocial();
      if (i === 3) renderFitness();
      if (i === 4) renderApps();
    }

    // Header date
    function updateHeaderDate() {
      const d = today();
      document.getElementById('headerDate').textContent = d.toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
    }
    document.getElementById('loadJsonBtn').onclick = () => {
  document.getElementById('jsonFileInput').click();
};

document.getElementById('jsonFileInput').onchange = (event) => {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);

      // Replace state with loaded JSON
      state = data;

      // Save to localStorage
      save();

      // Re-render all tabs
      renderCal();
      renderTodoMonths();
      renderSocial();
      renderFitness();
      renderApps();

      alert('JSON loaded successfully!');
    } catch (err) {
      alert('Error parsing JSON: ' + err.message);
    }
  };
  reader.readAsText(file);
};

    // ============================================================
    // TAB 3: SOCIAL TRACKER
    // ============================================================
    const TT_TYPES = ['Video', 'Live', 'Duet', 'Stitch'];
    const YT_TYPES = ['Video', 'Short', 'Premiere', 'Live'];
    const IG_TYPES = ['Post', 'Reel', 'Story', 'Carousel'];
    const X_TYPES = ['Tweet', 'Thread', 'Space', 'Poll'];
    const APPS_INTERACT = ['TikTok', 'YouTube', 'Instagram', 'X'];

    function addSocialRow(pos = 'bottom') {
      const row = {
        id: uid(),
        date: fmtDate(new Date()),
        title: '',
        tiktok: '', youtube: '', instagram: '', x: '',
        interactions: [false, false, false, false]
      };
      if (pos === 'top') state.socialRows.unshift(row);
      else state.socialRows.push(row);
      save(); renderSocial();
    }

    function renderSocial() {
      const body = document.getElementById('socialBody');
      if (!state.socialRows.length) {
        body.innerHTML = `<tr><td colspan="9"><div class="empty"><div class="empty-icon">📱</div>No posts tracked yet. Add a row to get started.</div></td></tr>`;
        return;
      }
      body.innerHTML = state.socialRows.map((row, ri) => `
    <tr>
      <td style="text-align:center;font-family:var(--mono);font-size:10px;color:var(--text3)">${ri + 1}</td>
      <td><input class="social-input social-date" type="date" value="${row.date}" onchange="updateSocial('${row.id}','date',this.value)"></td>
      <td><input class="social-input" style="min-width:140px" type="text" placeholder="Content title..." value="${row.title || ''}" onchange="updateSocial('${row.id}','title',this.value)"></td>
      ${renderPlatformCell(row, 'tiktok', TT_TYPES)}
      ${renderPlatformCell(row, 'youtube', YT_TYPES)}
      ${renderPlatformCell(row, 'instagram', IG_TYPES)}
      ${renderPlatformCell(row, 'x', X_TYPES)}
      <td>
        <div class="check-group">
          ${APPS_INTERACT.map((app, i) => `
            <label class="check-item">
              <input type="checkbox" ${row.interactions[i] ? 'checked' : ''} onchange="updateInteraction('${row.id}',${i},this.checked)">
              ${app}
            </label>
          `).join('')}
        </div>
      </td>
      <td>
        <div class="row-actions">
          <button class="icon-btn" title="Add row above" onclick="insertSocialRow('${row.id}',-1)">↑</button>
          <button class="icon-btn" title="Add row below" onclick="insertSocialRow('${row.id}',1)">↓</button>
          <button class="icon-btn" title="Delete row" onclick="deleteSocialRow('${row.id}')" style="color:var(--danger)">✕</button>
        </div>
      </td>
    </tr>
  `).join('');
    }

    function renderPlatformCell(row, field, types) {
      const val = row[field] || '';
      return `<td>
    <div class="radio-group">
      ${types.map(t => `
        <label class="radio-item">
          <input type="radio" name="${field}_${row.id}" value="${t}" ${val === t ? 'checked' : ''} onchange="updateSocial('${row.id}','${field}','${t}')">
          ${t}
        </label>
      `).join('')}
    </div>
  </td>`;
    }

    function updateSocial(id, field, val) {
      const row = state.socialRows.find(r => r.id === id);
      if (row) { row[field] = val; save(); }
    }
    function updateInteraction(id, idx, val) {
      const row = state.socialRows.find(r => r.id === id);
      if (row) { row.interactions[idx] = val; save(); }
    }
    function deleteSocialRow(id) {
      state.socialRows = state.socialRows.filter(r => r.id !== id);
      save(); renderSocial();
    }
    function insertSocialRow(id, dir) {
      const idx = state.socialRows.findIndex(r => r.id === id);
      const row = { id: uid(), date: fmtDate(new Date()), title: '', tiktok: '', youtube: '', instagram: '', x: '', interactions: [false, false, false, false] };
      const insertAt = dir > 0 ? idx + 1 : idx;
      state.socialRows.splice(insertAt, 0, row);
      save(); renderSocial();
    }

    // ============================================================
    // TAB 4: FITNESS
    // ============================================================
    let fitnessDate = new Date();
    const DAY_TYPES = ['day', 'night', 'gym', 'lazy'];
    const DAY_TYPE_LABELS = ['🌅 Day Workout', '🌙 Night', '🏋️ Gym', '😴 Lazy Day'];

    function fitnessNav(d) { fitnessDate.setDate(fitnessDate.getDate() + d); renderFitness(); }
    function fitnessNavToday() { fitnessDate = new Date(); renderFitness(); }

    function getFitnessKey() { return fmtDate(fitnessDate); }

    function getFitnessDay() {
      const k = getFitnessKey();
      if (!state.fitness[k]) state.fitness[k] = { weight: '', dayType: 'day', exercises: { day: [], night: [], gym: [] } };
      return state.fitness[k];
    }

    function saveFitnessData() {
      const k = getFitnessKey();
      const d = getFitnessDay();
      d.weight = document.getElementById('weightInput').value;
      save();
    }

    function renderFitness() {
      const todayKey = fmtDate(today());
      const todayData = state.fitness[todayKey] || {};
      const yestKey = fmtDate(new Date(today().setDate(today().getDate() - 1)));
      const yestData = state.fitness[yestKey] || {};

      const delta = (todayData.weight || 0) - (yestData.weight || 0);
      const span = document.getElementById('weightDelta');
      span.textContent = delta > 0 ? `↑${delta.toFixed(1)}kg` : delta < 0 ? `↓${Math.abs(delta).toFixed(1)}kg` : '-';
      span.style.color = delta > 0 ? 'var(--danger)' : delta < 0 ? 'var(--success)' : 'var(--text3)';
      const k = getFitnessKey();
      const d = getFitnessDay();

      document.getElementById('fitnessDateLabel').textContent = fitnessDate.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
      document.getElementById('weightInput').value = d.weight || '';

      // Day type selector
      const sel = document.getElementById('dayTypeSelector');
      sel.innerHTML = DAY_TYPES.map((t, i) => `
    <button class="day-type-btn ${d.dayType === t ? 'active ' + t : ''}" onclick="setDayType('${t}')">${DAY_TYPE_LABELS[i]}</button>
  `).join('');

      // Exercises per section
      ['day', 'night', 'gym'].forEach(section => {
        const list = document.getElementById('exList_' + section);
        const exs = d.exercises[section] || [];
        list.innerHTML = exs.length ? exs.map((ex, i) => `
      <div class="exercise-item">
        <input type="checkbox" ${ex.done ? 'checked' : ''} onchange="toggleExercise('${section}',${i},this.checked)">
        <input class="exercise-name ${ex.done ? 'done' : ''}" value="${ex.name}" onchange="updateExerciseName('${section}',${i},this.value)" placeholder="Exercise name...">
        <input style="width:90px;font-size:10px" placeholder="sets/reps" value="${ex.sets || ''}" onchange="updateExerciseSets('${section}',${i},this.value)">
        <button class="icon-btn" onclick="deleteExercise('${section}',${i})" style="color:var(--danger)">✕</button>
      </div>
    `).join('') : `<div style="font-family:var(--mono);font-size:10px;color:var(--text3);padding:8px 0">No exercises added</div>`;
      });
    }

    function setDayType(t) {
      const d = getFitnessDay();
      d.dayType = t;
      save(); renderFitness();
    }

    function openAddExercise(section = 'day') {
      openModal(`
    <h3>Add Exercise</h3>
    <div class="modal-row"><label>Section</label>
      <select id="exSection">
        <option value="day" ${section === 'day' ? 'selected' : ''}>🌅 Day Workout</option>
        <option value="night" ${section === 'night' ? 'selected' : ''}>🌙 Night</option>
        <option value="gym" ${section === 'gym' ? 'selected' : ''}>🏋️ Gym</option>
      </select>
    </div>
    <div class="modal-row"><label>Exercise Name</label><input id="exName" placeholder="e.g. Push-ups" autofocus></div>
    <div class="modal-row"><label>Sets / Reps</label><input id="exSets" placeholder="e.g. 3×15 or 30 mins"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="saveExercise()">Add</button>
    </div>
  `);
      document.getElementById('exName').focus();
    }

    function saveExercise() {
      const name = document.getElementById('exName').value.trim();
      const sets = document.getElementById('exSets').value.trim();
      const section = document.getElementById('exSection').value;
      if (!name) return;
      const d = getFitnessDay();
      if (!d.exercises[section]) d.exercises[section] = [];
      d.exercises[section].push({ name, sets, done: false });
      save(); closeModal(); renderFitness();
    }

    function toggleExercise(section, i, val) {
      const d = getFitnessDay();
      d.exercises[section][i].done = val;
      save(); renderFitness();
    }
    function updateExerciseName(section, i, val) {
      const d = getFitnessDay();
      d.exercises[section][i].name = val;
      save();
    }
    function updateExerciseSets(section, i, val) {
      const d = getFitnessDay();
      d.exercises[section][i].sets = val;
      save();
    }
    function deleteExercise(section, i) {
      const d = getFitnessDay();
      d.exercises[section].splice(i, 1);
      save(); renderFitness();
    }

    function duplicateFromDate(dateStr) {
      const todayKey = fmtDate(today());
      const sourceData = state.fitness[dateStr];
      if (!sourceData) return alert("No data for this date");

      state.fitness[todayKey] = {
        ...state.fitness[todayKey],
        exercises: {
          day: [...(sourceData.exercises.day || [])],
          night: [...(sourceData.exercises.night || [])],
          gym: [...(sourceData.exercises.gym || [])],
        },
        weight: state.fitness[todayKey]?.weight || 0,
        dayType: state.fitness[todayKey]?.dayType || 'lazy',
      };
      save();
      renderFitness();
    }

    // ============================================================
    // INIT
    // ============================================================
    load();
    updateHeaderDate();
    setInterval(updateHeaderDate, 60000);
    renderCal();
    renderTodoMonths();
    // Add 1 social row if none exist
    if (!state.socialRows.length) addSocialRow('bottom');
    else renderSocial();
    renderApps();
    
  </script>
<script>
  // Ensure DOM is loaded
  document.addEventListener('DOMContentLoaded', () => {

    const btn = document.getElementById('saveCloudBtn');
    if (!btn) return console.error('Save button not found');

    btn.addEventListener('click', () => {
      try {
        // Create a JSON blob of your app state
        const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);

        // Create a temporary <a> to trigger download
        const a = document.createElement('a');
        a.href = url;
        a.download = 'data.json';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        // Cleanup
        URL.revokeObjectURL(url);

        alert('data.json generated! Save it in your repo folder for nightly backup.');
      } catch (err) {
        console.error('Error saving data:', err);
        alert('Failed to save data. Check console.');
      }
    });

  });
</script>
</body>

</html>
